name: Update README cards

on:
  schedule:
    - cron: "0 4 * * *" # Runs once daily at 4am
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&bg_color=0d1117&title_color=66fcf1&border_color=66fcf1&show_icons=true&icon_color=66fcf1&text_color=fff
          path: profile/stats.svg
          token: ${{ secrets.STATS }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&bg_color=0d1117&title_color=66fcf1&border_color=66fcf1&langs_count=10&hide_progress=true&text_color=fff
          path: profile/top-langs.svg
          token: ${{ secrets.STATS }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: profile/pin-readme-tools-github-readme-stats.svg
          token: ${{ secrets.STATS }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
